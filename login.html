<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Shadon OSINT</title>
  <link rel="icon" href="https://i.imgur.com/cbKQRDU.jpeg" type="image/jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000; --bg2: #0a0a0a; --bg3: #111;
      --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.15);
      --text: #fff; --muted: rgba(255,255,255,0.4);
      --font-head: 'Syne', sans-serif; --font-mono: 'IBM Plex Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    .grid-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    nav {
      position: relative; z-index: 10; padding: 0 2.5rem; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: .6rem; }
    .nav-logo img { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; }
    .nav-logo span { font-family: var(--font-head); font-weight: 800; font-size: .95rem; }
    .nav-back { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); transition: color .2s; }
    .nav-back:hover { color: var(--text); }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; position: relative; z-index: 10; }
    .auth-box {
      width: 100%; max-width: 400px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--bg2); padding: 2.5rem;
      animation: fadeUp .6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    h1 { font-family: var(--font-head); font-weight: 800; font-size: 1.6rem; letter-spacing: -.03em; margin-bottom: .5rem; }
    .auth-sub { font-size: .68rem; color: var(--muted); margin-bottom: 2rem; line-height: 1.7; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .45rem; }
    input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: .8rem;
      padding: .7rem .9rem; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: rgba(255,255,255,0.35); }
    input::placeholder { color: rgba(255,255,255,0.2); }
    .submit-btn {
      width: 100%; padding: .75rem; border-radius: 7px; margin-top: 1.5rem;
      background: #fff; color: #000; border: none; cursor: pointer;
      font-family: var(--font-mono); font-size: .72rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase; transition: background .2s;
    }
    .submit-btn:hover { background: rgba(255,255,255,0.85); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
    .auth-footer { margin-top: 1.5rem; text-align: center; font-size: .64rem; color: var(--muted); }
    .auth-footer a { color: var(--text); border-bottom: 1px solid var(--border); }
    .auth-footer a:hover { border-color: rgba(255,255,255,0.4); }
    .error-msg { font-size: .65rem; color: #ff6b6b; margin-top: .6rem; display: none; }
    .error-msg.show { display: block; }
    .success-msg { font-size: .65rem; color: #51cf66; margin-top: .6rem; display: none; }
    .success-msg.show { display: block; }
    .divider-line { height: 1px; background: var(--border); margin: 1.5rem 0; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <nav>
    <div class="nav-logo">
      <img src="https://i.imgur.com/cbKQRDU.jpeg" alt="Shadon" />
      <span>Shadon</span>
    </div>
    <a href="index.html" class="nav-back">← Back to home</a>
  </nav>
  <main>
    <div class="auth-box">
      <h1>Welcome back</h1>
      <p class="auth-sub">Sign in to your Shadon account to continue your investigations.</p>
      <form id="loginForm">
        <div class="field">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="Your password" required />
        </div>
        <div class="error-msg" id="globalError"></div>
        <div class="success-msg" id="successMsg">Login successful! Redirecting...</div>
        <button type="submit" class="submit-btn" id="submitBtn">Sign In →</button>
      </form>
      <div class="divider-line"></div>
      <p class="auth-footer">No account yet? <a href="register.html">Create one free</a></p>
    </div>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      document.getElementById('globalError').classList.remove('show');
      btn.disabled = true; btn.textContent = 'Signing in...';
      await new Promise(r => setTimeout(r, 600));
      const users = JSON.parse(localStorage.getItem('shadon_users') || '[]');
      const user = users.find(u => u.email === email && u.password === btoa(password));
      if(!user) {
        document.getElementById('globalError').textContent = 'Invalid email or password';
        document.getElementById('globalError').classList.add('show');
        btn.disabled = false; btn.textContent = 'Sign In →';
        return;
      }
      const token = btoa(JSON.stringify({ id: user.id, username: user.username, email }));
      localStorage.setItem('shadon_token', token);
      localStorage.setItem('shadon_user', JSON.stringify(user));
      document.getElementById('successMsg').classList.add('show');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    });
    if(localStorage.getItem('shadon_token')) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
